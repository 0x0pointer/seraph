# gateway-examples/traefik.yml
# Traefik v3 — Seraph universal hook integration
#
# Approach: forwardAuth middleware
#
# Traefik's forwardAuth middleware forwards the original request to an auth
# service. We expose a dedicated Traefik-compatible endpoint on Seraph
# that reads the body from a special header Traefik injects, or we use the
# transparent proxy mode instead (simpler — see bottom of this file).
#
# ── Option A: forwardAuth + universal hook (header-based text extraction)
#
# Limitation: Traefik's forwardAuth only forwards HEADERS, not the request
# body, to the auth service. So you must encode the text to scan in a header
# that your upstream service (e.g. LiteLLM, your app) sets before the route
# reaches Traefik, OR use Option B below.
#
# ── Option B: Transparent proxy (RECOMMENDED for most cases)
#
# Point the route at Seraph's /api/integrations/proxy endpoint.
# Seraph reads the full body, scans, and forwards to the real LLM.
# Zero Traefik plugin needed.

# ─────────────────────────────────────────────────────────────────────────────
# Option B — Transparent Proxy (recommended)
# Clients point at Traefik → Traefik routes to Seraph proxy → LLM
# ─────────────────────────────────────────────────────────────────────────────

http:
  routers:
    # All LLM traffic arrives at Traefik on /llm/...
    llm-with-guardrails:
      rule: "PathPrefix(`/llm`)"
      service: seraph-proxy
      middlewares:
        - inject-skf-headers
        - strip-llm-prefix

  middlewares:
    # Inject the Seraph auth key and upstream destination
    inject-skf-headers:
      headers:
        customRequestHeaders:
          # Seraph connection key — use Traefik's env var substitution
          Authorization:    "Bearer {{ env \"SERAPH_KEY\" }}"
          # Where Seraph should forward to after scanning
          X-Upstream-URL:   "https://api.openai.com"
          # OpenAI credentials — Seraph passes this as the upstream auth
          X-Upstream-Auth:  "Bearer {{ env \"OPENAI_API_KEY\" }}"

    # Strip /llm prefix before forwarding to Seraph proxy
    strip-llm-prefix:
      stripPrefix:
        prefixes:
          - "/llm"

  services:
    # Seraph transparent proxy endpoint
    seraph-proxy:
      loadBalancer:
        servers:
          - url: "http://seraph:8000/api/integrations/proxy"


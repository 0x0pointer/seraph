# gateway-examples/nginx.conf
# Nginx — Seraph universal hook integration
#
# Approach: auth_request + lua body injection
#
# Nginx's built-in auth_request module only forwards headers, not the body,
# so we use the lua-nginx-module (OpenResty) to POST the user message to
# Seraph's /api/integrations/hook endpoint before proxying to the LLM.
#
# Requirements: OpenResty (nginx + lua-nginx-module + lua-resty-http)
#
# Quick start (Docker):
#   docker run -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf openresty/openresty

http {
    # ── Seraph connection key (set via environment or secret manager) ───────
    # Pass via environment: SERAPH_KEY=ts_conn_abc123
    # Or hardcode for local testing (not recommended for production):
    # set $seraph_key "ts_conn_your_key_here";

    upstream seraph {
        server seraph:8000;    # Seraph backend
        keepalive 32;
    }

    upstream llm_provider {
        server api.openai.com:443; # Replace with your LLM provider
        keepalive 16;
    }

    server {
        listen 8080;

        # ── LLM proxy with Seraph guardrails ─────────────────────────────
        location /v1/chat/completions {

            # Buffer the request body so Lua can read it
            lua_need_request_body on;

            access_by_lua_block {
                local http    = require("resty.http")
                local cjson   = require("cjson.safe")
                local ngx_var = ngx.var

                -- Read and parse the incoming request body
                local body    = ngx.req.get_body_data()
                if not body or body == "" then return end

                local parsed  = cjson.decode(body)
                if not parsed or not parsed.messages then return end

                -- Extract the last user message
                local user_text = ""
                local msgs = parsed.messages
                for i = #msgs, 1, -1 do
                    if msgs[i].role == "user" then
                        user_text = msgs[i].content or ""
                        break
                    end
                end
                if user_text == "" then return end

                -- Call Seraph universal hook
                local httpc = http.new()
                httpc:set_timeout(10000)

                local seraph_key = os.getenv("SERAPH_KEY") or ""
                local res, err = httpc:request_uri(
                    "http://seraph:8000/api/integrations/hook",
                    {
                        method  = "POST",
                        body    = cjson.encode({
                            text      = user_text,
                            direction = "input",
                        }),
                        headers = {
                            ["Content-Type"]  = "application/json",
                            ["Authorization"] = "Bearer " .. seraph_key,
                        },
                    }
                )

                -- Fail-closed: block if Seraph is unavailable
                if err or not res then
                    ngx.log(ngx.ERR, "Seraph unreachable: ", err)
                    ngx.status = 503
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        error  = "safety_scanner_unavailable",
                        detail = "Guardrail scanner did not respond."
                    }))
                    ngx.exit(503)
                end

                -- Block if Seraph returned non-200
                if res.status ~= 200 then
                    local result = cjson.decode(res.body) or {}
                    ngx.log(ngx.WARN, "Seraph blocked request: ", result.detail)
                    ngx.status = 400
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        error  = "guardrail_violation",
                        detail = result.detail or "Request blocked by guardrail",
                    }))
                    ngx.exit(400)
                end

                -- If a fix was applied, replace the body with the sanitized text
                local result = cjson.decode(res.body) or {}
                if result.fix_applied and result.sanitized_text then
                    for i = #msgs, 1, -1 do
                        if msgs[i].role == "user" then
                            msgs[i].content = result.sanitized_text
                            break
                        end
                    end
                    local new_body = cjson.encode(parsed)
                    ngx.req.set_body_data(new_body)
                    ngx.req.set_header("Content-Length", tostring(#new_body))
                end
            }

            # Forward to the upstream LLM
            proxy_pass          https://llm_provider;
            proxy_ssl_server_name on;
            proxy_set_header    Host            api.openai.com;
            proxy_set_header    X-Real-IP       $remote_addr;
            proxy_read_timeout  120s;
        }

        # ── Health check ─────────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}

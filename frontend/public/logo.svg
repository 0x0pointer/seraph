<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 52" fill="none">

  <!-- Icon mark — brand green rounded square -->
  <rect x="0" y="1" width="50" height="50" rx="8" fill="#5CF097"/>
  <rect x="0" y="1" width="50" height="50" rx="8" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  <!-- Purple accent bar inside mark -->
  <rect x="8" y="13" width="15" height="5" rx="2.5" fill="#7B7FD4"/>
  <!-- Dark accent bar inside mark -->
  <rect x="27" y="13" width="15" height="5" rx="2.5" fill="rgba(0,0,0,0.2)"/>
  <!-- S letter inside mark -->
  <text
    x="25"
    y="39"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace"
    font-size="24"
    font-weight="700"
    fill="#0A0F1F"
    text-anchor="middle"
  >S</text>

  <!-- Wordmark: "seraph" -->
  <text
    x="62"
    y="36"
    font-family="'Inter', system-ui, sans-serif"
    font-size="22"
    font-weight="600"
    fill="#e2e8f0"
    letter-spacing="3"
  >seraph</text>

</svg>

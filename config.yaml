# Seraph — YAML-configured LLM guardrail proxy
# Documentation: https://github.com/0x0pointer/seraph

listen: "0.0.0.0:8000"

# Default LLM backend. Override per-request with the X-Upstream-URL header.
upstream: "https://api.openai.com"

# LLM provider API key — injected server-side as Authorization header.
# Set here or via UPSTREAM_API_KEY env var (env var takes priority).
upstream_api_key: ""

# API keys for authenticating with Seraph (leave empty for open mode)
api_keys:
  - "sk_seraph_abc123"

# Levels: debug | info | warning | error | critical
logging:
  level: info
  audit: true
  # Set to a file path for SQLite audit storage, null for stdout JSON
  audit_file: null

# ─── Allowed Topics Shield (allow-list approach) ─────────────────────────────
#
# Instead of trying to catch every attack (deny-list), define what the
# chatbot is ALLOWED to discuss. Everything else is rejected.
# This is the strongest defense against novel attacks — they're blocked
# by default because they're off-topic.
#
# Configure per-app with topics matching your chatbot's purpose.
#
# allowed_topics_shield:
#   enabled: true
#   threshold: 0.40              # similarity threshold (lower = stricter)
#   fallback_message: "I can only help with account recovery, 2FA, and API issues."
#   topics:
#     - "password reset and account recovery procedures"
#     - "two-factor authentication setup and troubleshooting"
#     - "API connection issues and endpoint troubleshooting"
#     - "hello hi hey greetings good morning"

# ─── Risk Engine ─────────────────────────────────────────────────────────────
#
# Stateful threat detection with evidence-based policy. Tracks risk across
# requests per client, detects multi-turn attacks and reconnaissance patterns,
# and adapts scanning depth for elevated-risk clients.
#
# Disabled by default — opt in when you want stateful threat detection.
#
# risk_engine:
#   enabled: true
#   expose_debug_headers: false      # true shows X-Seraph-Risk-Level, Evidence, Reason
#   block_duration_seconds: 300      # 5 min hard block for confirmed attacks
#   persist: true                    # write risk events to SQLite
#   persist_file: null               # null = use logging.audit_file
#   max_clients: 10000               # max tracked clients in memory
#   max_deep_per_second: 5           # scan budget — deep tier
#   max_enhanced_per_second: 20      # scan budget — enhanced tier
#   elevated_threshold: 0.3          # risk score → elevated
#   high_threshold: 0.6              # risk score → high
#   critical_threshold: 0.8          # risk score → critical
#   blocked_threshold: 0.95          # risk score → blocked
#   scanner_weights:                 # override default scanner weights
#     PromptInjection: 1.0
#     EmbeddingShield: 0.95

# ─── Scanner configuration ───────────────────────────────────────────────────
#
# By default (when the scanners section is absent), Seraph loads the full
# built-in guardrail catalog: 42 scanners with 322+ trained rules from
# SecLists, Garak, Promptfoo, and Deck of Many Prompts — including
# multi-language injection defense, text canonicalization, and the
# Embedding Similarity Shield.
#
# To activate or deactivate a scanner, comment or uncomment its block below.
# Each scanner has:
#   type:      Scanner class name
#   on_fail:   block | fix | monitor | reask
#   threshold: Detection threshold (0.0–1.0, lower = more sensitive)
#   params:    Scanner-specific parameters

scanners:

  # ── INPUT SCANNERS ──────────────────────────────────────────────────────────
  input:

    # ML prompt injection detector (DeBERTa v3)
    - type: PromptInjection
      on_fail: block
      params:
        use_onnx: true

    # ML toxicity classifier (DistilBERT)
    - type: Toxicity
      on_fail: block
      params:
        threshold: 0.5
        use_onnx: true

    # Credential/secret detection — redacts matches in-place
    - type: Secrets
      on_fail: fix
      params: {}

    # Token count limiter (tiktoken)
    - type: TokenLimit
      on_fail: block
      params:
        limit: 4096

    # NER-based PII anonymization
    - type: Anonymize
      on_fail: fix
      params:
        use_onnx: true

    # Code detection — blocks code in input
    - type: BanCode
      on_fail: block
      params:
        threshold: 0.4

    # Competitor mention detection (NLI zero-shot)
    - type: BanCompetitors
      on_fail: monitor
      params:
        competitors: ["OpenAI", "Anthropic", "Google"]
        threshold: 0.5

    # Exact attack phrase blocklist — 273 phrases from 4 red-team datasets
    # + v17 multi-language (ES, FR, DE, PT, IT) injection defense.
    # Full list in app/core/guardrail_catalog.py
    - type: BanSubstrings
      on_fail: block
      params:
        substrings: []  # see guardrail_catalog.py for full 273-phrase list
        case_sensitive: false
        contains_all: false

    # NLI-based semantic topic blocking (14 topics)
    - type: BanTopics
      on_fail: block
      params:
        topics: []  # see guardrail_catalog.py for full 14-topic list
        threshold: 0.4
        use_onnx: true

    # Per-language code blocking (routes to Code scanner)
    - type: Code
      on_fail: block
      params:
        languages: ["Python", "JavaScript", "Java", "C", "C++", "C#", "Ruby", "Go", "Rust", "PHP"]
        is_blocked: true
        threshold: 0.5

    # Emotion classification
    - type: EmotionDetection
      on_fail: monitor
      params: {}

    # Gibberish text detector
    - type: Gibberish
      on_fail: block
      params:
        threshold: 0.7

    # Unicode invisible character detection
    - type: InvisibleText
      on_fail: block
      params: {}

    # Language detection — monitors non-English input (v17)
    # Set on_fail: block if your app only serves English users.
    - type: Language
      on_fail: monitor
      params:
        valid_languages: ["en"]

    # Structural attack pattern matching — 93 regex patterns
    # Full list in app/core/guardrail_catalog.py
    - type: Regex
      on_fail: block
      params:
        patterns: []  # see guardrail_catalog.py for full 93-pattern list

    # Sentiment analysis (VADER lexicon)
    - type: Sentiment
      on_fail: monitor
      params:
        threshold: 0.0

    # Semantic similarity scanner — catches paraphrased prompt injections
    # by comparing embeddings against 49 known attack patterns.
    - type: EmbeddingShield
      on_fail: block
      params:
        threshold: 0.72

  # ── OUTPUT SCANNERS ─────────────────────────────────────────────────────────
  output:

    # ML toxicity classifier (DistilBERT)
    - type: Toxicity
      on_fail: block
      params:
        threshold: 0.5
        use_onnx: true

    # Refusal detection — triggers reask for LLM retry
    - type: NoRefusal
      on_fail: reask
      params: {}

    # Competitor mention detection (NLI zero-shot)
    - type: BanCompetitors
      on_fail: monitor
      params:
        competitors: ["OpenAI", "Anthropic", "Google"]
        threshold: 0.5

    # Bias detection (DistilRoBERTa)
    - type: Bias
      on_fail: reask
      params:
        threshold: 0.75

    # Code detection — blocks code in output
    - type: BanCode
      on_fail: block
      params:
        threshold: 0.4

    # Jailbreak success detection — 61 phrases
    # Full list in app/core/guardrail_catalog.py
    - type: BanSubstrings
      on_fail: block
      params:
        substrings: []  # see guardrail_catalog.py for full 61-phrase list
        case_sensitive: false
        contains_all: false

    # NLI-based semantic topic blocking (13 output topics)
    - type: BanTopics
      on_fail: block
      params:
        topics: []  # see guardrail_catalog.py for full 13-topic list
        threshold: 0.5
        use_onnx: true

    # Per-language code blocking
    - type: Code
      on_fail: block
      params:
        languages: ["Python", "JavaScript", "Java", "C", "C++", "C#", "Ruby", "Go", "Rust", "PHP"]
        is_blocked: true
        threshold: 0.5

    # PII re-insertion detection
    - type: Deanonymize
      on_fail: fix
      params: {}

    # Emotion classification
    - type: EmotionDetection
      on_fail: monitor
      params: {}

    # Factual consistency / hallucination detection (Vectara) — SLOW
    # - type: FactualConsistency
    #   on_fail: reask
    #   params:
    #     threshold: 0.5

    # Gibberish text detector
    - type: Gibberish
      on_fail: block
      params:
        threshold: 0.7

    # JSON schema validation
    - type: JSON
      on_fail: reask
      params: {}

    # Output language enforcement
    - type: Language
      on_fail: block
      params:
        valid_languages: ["en"]

    # Input/output language consistency
    - type: LanguageSame
      on_fail: reask
      params: {}

    # Malicious URL detection
    - type: MaliciousURLs
      on_fail: block
      params: {}

    # Lightweight refusal classifier
    - type: NoRefusalLight
      on_fail: reask
      params: {}

    # Reading time estimation
    - type: ReadingTime
      on_fail: monitor
      params:
        max_time: 5.0

    # Output regex patterns — 8 rules for credential leaks, PII, system prompt echo
    # Full list in app/core/guardrail_catalog.py
    - type: Regex
      on_fail: fix
      params:
        patterns: []  # see guardrail_catalog.py for full 8-pattern list

    # Semantic relevance check (sentence-transformers) — SLOW
    # - type: Relevance
    #   on_fail: reask
    #   params:
    #     threshold: 0.5

    # Sensitive data pattern detection
    - type: Sensitive
      on_fail: fix
      params: {}

    # Sentiment analysis (VADER lexicon)
    - type: Sentiment
      on_fail: monitor
      params:
        threshold: 0.0

    # URL reachability check (HTTP HEAD) — SLOW
    # - type: URLReachability
    #   on_fail: monitor
    #   params: {}

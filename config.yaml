#       on_fail: monitor
#       params: {}
#
#     # [DISABLED] Gibberish text detector
#     - type: Gibberish
#       on_fail: block
#       params:
#         threshold: 0.7
#
#     # [ENABLED] Unicode invisible character detection
#     - type: InvisibleText
#       on_fail: block
#       params: {}
#
#     # [ENABLED] Language detection — monitors non-English input (v17)
#     # Strongest defense against multi-language injection bypass.
#     # Set on_fail: block if your app only serves English users.
#     - type: Language
#       on_fail: monitor
#       params:
#         valid_languages: ["en"]
#
#     # [ENABLED] Structural attack pattern matching — 93 regex patterns
#     # covering credential leaks, DAN/jailbreak, no-restriction declarations,
#     # never-refuse, encoding attacks, system prompt extraction, fictional
#     # framing, v17 synonym evasion, identity reassignment, unfiltered
#     # requests, cross-language (ES/FR/DE/PT/IT), and escalation markers.

# Seraph — Two-Tier LLM Guardrail Proxy
# Documentation: https://github.com/0x0pointer/seraph

listen: "0.0.0.0:8000"

# Default LLM backend. Override per-request with the X-Upstream-URL header.
upstream: "https://api.openai.com"

# LLM provider API key — injected server-side as Authorization header.
# Set here or via UPSTREAM_API_KEY env var (env var takes priority).
upstream_api_key: ""

# API keys for authenticating with Seraph (leave empty for open mode)
api_keys:
  - "sk_seraph_abc123"

logging:
  level: info
  audit: true
  # Set to a file path for SQLite audit storage, null for stdout JSON
  audit_file: null

# ─── Tier 1: NeMo Guardrails ────────────────────────────────────────────────
#
# Semantic allow-list firewall. Defines approved conversational flows via
# Colang definitions. Any input that doesn't match an allowed intent is
# blocked immediately — no deny-list chasing required.

nemo_tier:
  enabled: true
  config_dir: "app/services/nemo_config"
  embedding_threshold: 0.82
  model: "gpt-4o-mini"
  model_engine: "openai"
  # api_key: ""  # Falls back to upstream_api_key / UPSTREAM_API_KEY env var

# ─── Tier 2: LLM-as-a-Judge (LangGraph) ─────────────────────────────────────
#
# Small language model evaluates requests that pass Tier 1 for deeper threats:
# prompt injection, data exfiltration, social engineering, policy violations.
# Configurable to run on every request or only when Tier 1 is uncertain.

judge:
  enabled: true
  model: "gpt-4o-mini"
  # base_url: "http://localhost:11434/v1"  # Uncomment for Ollama / vLLM
  # api_key: ""                            # Falls back to upstream_api_key
  temperature: 0.0
  max_tokens: 512
  risk_threshold: 0.7
  prompt_file: "app/services/judge_prompt.txt"
  run_on_every_request: true
  # When run_on_every_request is false, judge only runs when NeMo's
  # embedding score falls in this uncertain band:
  uncertainty_band_low: 0.70
  uncertainty_band_high: 0.85

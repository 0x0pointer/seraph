# Seraph — Two-Tier LLM Guardrail Proxy
# Documentation: https://github.com/0x0pointer/seraph

listen: "0.0.0.0:8000"

# Default LLM backend. Override per-request with the X-Upstream-URL header.
upstream: "https://api.openai.com"

# LLM provider API key — injected server-side as Authorization header.
# Set here or via UPSTREAM_API_KEY env var (env var takes priority).
upstream_api_key: ""

# API keys for authenticating with Seraph (leave empty for open mode)
api_keys:
  - "sk_seraph_abc123"

logging:
  level: info
  audit: true
  # Set to a file path for SQLite audit storage, null for stdout JSON
  audit_file: null

# ─── Tier 1: NeMo Guardrails ────────────────────────────────────────────────
#
# Semantic allow-list firewall. Defines approved conversational flows via
# Colang definitions. Any input that doesn't match an allowed intent is
# blocked immediately — no deny-list chasing required.

nemo_tier:
  enabled: true
  config_dir: "app/services/nemo_config"
  embedding_threshold: 0.80  # Lowered for healthcare — varied phrasing (medical jargon, casual, anxious)
  model: "mistral:7b-instruct"
  model_engine: "openai"
  base_url: "http://localhost:11434/v1"  # Ollama local endpoint
  scan_input: true   # NeMo classifies user input against allowed intents
  scan_output: true  # NeMo classifies LLM output (adds latency on CPU)
  # api_key: ""  # Not needed for local Ollama

# ─── Tier 2: LLM-as-a-Judge (LangGraph) ─────────────────────────────────────
#
# Small language model evaluates requests that pass Tier 1 for deeper threats:
# prompt injection, data exfiltration, social engineering, policy violations.
# Configurable to run on every request or only when Tier 1 is uncertain.

judge:
  enabled: true
  model: "mistral:7b-instruct"
  base_url: "http://localhost:11434/v1"  # Ollama local endpoint (same model as NeMo tier)
  # To use OpenAI instead:  model: "gpt-4o-mini", base_url: null, api_key: "sk-..."
  temperature: 0.0
  max_tokens: 512
  risk_threshold: 0.7
  prompt_file: "app/services/judge_prompt.txt"
  scan_input: true   # Judge evaluates user input for threats
  scan_output: true  # Judge evaluates LLM output for leaks/harmful content
  run_on_every_request: true
  # When run_on_every_request is false, judge only runs when NeMo's
  # embedding score falls in this uncertain band:
  uncertainty_band_low: 0.70
  uncertainty_band_high: 0.85

# ─── Scanning Profiles ─────────────────────────────────────────────────────
#
# Mix and match the toggles above to fit your needs:
#
#   All 4 stages (max security):
#     nemo_tier.scan_input: true, nemo_tier.scan_output: true
#     judge.scan_input: true,     judge.scan_output: true
#
#   NeMo input + Judge both (recommended, fast):
#     nemo_tier.scan_input: true, nemo_tier.scan_output: false
#     judge.scan_input: true,     judge.scan_output: true
#
#   NeMo only (no external API calls for scanning):
#     nemo_tier.scan_input: true, nemo_tier.scan_output: true
#     judge.scan_input: false,    judge.scan_output: false
#
#   Judge only (no local model needed):
#     nemo_tier.scan_input: false, nemo_tier.scan_output: false
#     judge.scan_input: true,      judge.scan_output: true

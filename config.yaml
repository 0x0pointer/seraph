#       on_fail: block
#       params:
#         languages: ["Python", "JavaScript", "Java", "C", "C++", "C#", "Ruby", "Go", "Rust", "PHP"]
#         is_blocked: true
#         threshold: 0.5
#
#     # [DISABLED] Emotion classification

# Seraph — YAML-configured LLM guardrail proxy
# Documentation: https://github.com/0x0pointer/seraph

listen: "0.0.0.0:8000"

# Default LLM backend. Override per-request with the X-Upstream-URL header.
upstream: "https://api.openai.com"

# LLM provider API key — injected server-side as Authorization header.
# Set here or via UPSTREAM_API_KEY env var (env var takes priority).
upstream_api_key: ""

# API keys for authenticating with Seraph (leave empty for open mode)
api_keys:
  - "sk_seraph_abc123"

logging:
  level: info
  audit: true
  # Set to a file path for SQLite audit storage, null for stdout JSON
  audit_file: null

# ─── Scanner configuration ───────────────────────────────────────────────────
#
# By default (when the scanners section is absent), Seraph loads the full
# built-in guardrail catalog: 42 scanners with 322+ trained rules from
# SecLists, Garak, Promptfoo, and Deck of Many Prompts — including
# multi-language injection defense, text canonicalization, and the
# Embedding Similarity Shield.
#
# Uncomment and customize below ONLY if you want to override the defaults.
# WARNING: Defining your own scanners section replaces the entire catalog —
# you will lose the trained ban lists, regex patterns, and topic classifiers.
#
# The full catalog is shown below for reference. Each scanner has:
#   type:      Scanner class name (maps to llm-guard scanner or custom scanner)
#   on_fail:   block | fix | monitor | reask
#   threshold: Detection threshold (0.0–1.0, lower = more sensitive)
#   params:    Scanner-specific parameters
#
# Scanners marked [ENABLED] are active by default.
# Scanners marked [DISABLED] are available but off — uncomment to enable.
#
# scanners:
#
#   # ── INPUT SCANNERS (17) ────────────────────────────────────────────────────
#   input:
#
#     # [ENABLED] ML prompt injection detector (DeBERTa v3)
#     - type: PromptInjection
#       on_fail: block
#       params:
#         use_onnx: true
#
#     # [ENABLED] ML toxicity classifier (DistilBERT)
#     - type: Toxicity
#       on_fail: block
#       params:
#         threshold: 0.5
#         use_onnx: true
#
#     # [ENABLED] Credential/secret detection — redacts matches in-place
#     - type: Secrets
#       on_fail: fix
#       params: {}
#
#     # [ENABLED] Token count limiter (tiktoken)
#     - type: TokenLimit
#       on_fail: block
#       params:
#         limit: 4096
#
#     # [DISABLED] NER-based PII anonymization
#     - type: Anonymize
#       on_fail: fix
#       params:
#         use_onnx: true
#
#     # [DISABLED] Code detection — blocks code in input
#     - type: BanCode
#       on_fail: block
#       params:
#         threshold: 0.4
#
#     # [DISABLED] Competitor mention detection (NLI zero-shot)
#     - type: BanCompetitors
#       on_fail: monitor
#       params:
#         competitors: ["OpenAI", "Anthropic", "Google"]
#         threshold: 0.5
#
#     # [ENABLED] Exact attack phrase blocklist — 273 phrases from 4 red-team
#     # datasets + v17 multi-language (ES, FR, DE, PT, IT) injection defense.
#     # Phrases include DAN family, instruction wipes, identity reassignment,
#     # authority framing, dialogue laundering, and escalation markers.
#     # Full list in app/core/guardrail_catalog.py
#     - type: BanSubstrings
#       on_fail: block
#       params:
#         substrings: []  # see guardrail_catalog.py for full 273-phrase list
#         case_sensitive: false
#         contains_all: false
#
#     # [ENABLED] NLI-based semantic topic blocking (14 topics)
#     # Topics: weapons, drugs, hacking, malware, exploits, phishing,
#     # social engineering, identity theft, fraud, terrorism, CSAM,
#     # self-harm, harassment, illegal activities
#     - type: BanTopics
#       on_fail: block
#       params:
#         topics: []  # see guardrail_catalog.py for full 14-topic list

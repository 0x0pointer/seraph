# Seraph config for the nginx reverse proxy chatbot example.
# Client => Nginx => Seraph => LLM

listen: "0.0.0.0:8000"

# Set your LLM provider here, or leave empty and pass X-Upstream-URL per request.
upstream: "https://api.openai.com"

# LLM provider API key — stays server-side, never exposed to clients.
# Injected via UPSTREAM_API_KEY env var (see .env file).
upstream_api_key: ""

# Open mode — no Seraph API key required.
# In production, set keys here and pass them from nginx via proxy_set_header.
api_keys: []

logging:
  level: info
  audit: true
  audit_file: null

# Tier 1: NeMo Guardrails — semantic allow-list firewall
nemo_tier:
  enabled: true
  embedding_threshold: 0.85
  model: "gpt-4o-mini"
  model_engine: "openai"

# Tier 2: LLM-as-a-Judge via LangGraph
judge:
  enabled: true
  model: "gpt-4o-mini"
  temperature: 0.0
  risk_threshold: 0.7
  run_on_every_request: true

# Production-style nginx reverse proxy in front of Seraph.
#
# Architecture: Client => Nginx (this) => Seraph => LLM
#
# Nginx handles:
#   - Static file serving (chat UI)
#   - Rate limiting
#   - Request buffering
#   - Upstream health checks
#   - Optional TLS termination (add ssl directives)
#
# Seraph handles:
#   - Input/output scanning
#   - Auth (API key validation)
#   - Forwarding to LLM provider

# Rate limiting zone: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream seraph_backend {
    server seraph:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # --- Static chat UI ---
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # --- Health check (bypass rate limit) ---
    location = /health {
        proxy_pass http://seraph_backend;
        proxy_set_header Connection "";
    }

    # --- Reload endpoint ---
    location = /reload {
        proxy_pass http://seraph_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- LLM API proxy (all paths) ---
    # Rate limited, buffered, with upstream timeouts.
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://seraph_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for LLM calls (can be slow)
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # Streaming support (SSE)
        proxy_buffering off;
        proxy_cache off;

        # Body size limit (match Seraph's 4 MB limit)
        client_max_body_size 4m;
    }

    # Block everything else
    location / {
        return 404;
    }
}

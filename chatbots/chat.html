<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seraph Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #e67e22;
  }
  header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #2a2a2a;
    color: #888;
  }
  #settings {
    padding: 12px 24px;
    background: #141414;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  #settings label {
    font-size: 12px;
    color: #888;
  }
  #settings input, #settings select {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  #settings input:focus, #settings select:focus {
    outline: none;
    border-color: #e67e22;
  }
  #settings input { width: 200px; }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 720px;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #e67e22;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-bottom-left-radius: 4px;
  }
  .msg.error {
    align-self: flex-start;
    background: #3a1a1a;
    border: 1px solid #5a2a2a;
    color: #ff6b6b;
    border-bottom-left-radius: 4px;
  }
  .msg.blocked {
    align-self: center;
    background: #3a2a1a;
    border: 1px solid #5a3a1a;
    color: #ffaa44;
    font-size: 13px;
    text-align: center;
  }
  #input-area {
    padding: 16px 24px;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    display: flex;
    gap: 12px;
  }
  #input-area textarea {
    flex: 1;
    background: #0f0f0f;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    height: 48px;
    line-height: 1.5;
  }
  #input-area textarea:focus { outline: none; border-color: #e67e22; }
  #input-area button {
    background: #e67e22;
    color: #fff;
    border: none;
    padding: 0 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #input-area button:hover { background: #d35400; }
  #input-area button:disabled { background: #555; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>Seraph Chat</h1>
  <span class="badge" id="status-badge">connecting...</span>
</header>

<div id="settings">
  <div>
    <label>Model</label><br>
    <input type="text" id="model" value="gpt-4" placeholder="gpt-4, claude-sonnet-4-20250514, etc.">
  </div>
  <div>
    <label>Seraph Key</label><br>
    <input type="text" id="seraph-key" value="sk_seraph_abc123" placeholder="leave empty for open mode">
  </div>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="prompt" placeholder="Type a message..." rows="1"></textarea>
  <button id="send" onclick="send()">Send</button>
</div>

<script>
const API_BASE = window.SERAPH_API_BASE || "/api";
const chat = document.getElementById("chat");
const promptEl = document.getElementById("prompt");
const sendBtn = document.getElementById("send");
const badge = document.getElementById("status-badge");
let messages = [];

// Auto-check health
(async () => {
  try {
    const r = await fetch("/health");
    if (r.ok) {
      badge.textContent = "connected";
      badge.style.background = "#1a3a1a";
      badge.style.color = "#4caf50";
    }
  } catch {
    badge.textContent = "disconnected";
    badge.style.background = "#3a1a1a";
    badge.style.color = "#ff6b6b";
  }
})();

promptEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = promptEl.value.trim();
  if (!text) return;

  promptEl.value = "";
  sendBtn.disabled = true;
  addMsg("user", text);
  messages.push({ role: "user", content: text });

  const headers = { "Content-Type": "application/json" };
  const seraphKey = document.getElementById("seraph-key").value.trim();

  if (seraphKey) headers["Authorization"] = `Bearer ${seraphKey}`;

  const model = document.getElementById("model").value.trim() || "gpt-4";

  try {
    const resp = await fetch(`${API_BASE}/v1/chat/completions`, {
      method: "POST",
      headers,
      body: JSON.stringify({ model, messages, stream: false }),
    });

    if (resp.status === 400) {
      const err = await resp.json();
      addMsg("blocked", `Blocked by Seraph: ${err.detail}`);
      messages.pop();
    } else if (resp.status === 413) {
      addMsg("error", "Message too large (max 4 MB)");
      messages.pop();
    } else if (resp.status === 502) {
      const err = await resp.json();
      addMsg("error", `Upstream error: ${err.detail || err.error}`);
      messages.pop();
    } else if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      addMsg("error", `Error ${resp.status}: ${err.detail || err.error || "Unknown error"}`);
      messages.pop();
    } else {
      const data = await resp.json();
      // OpenAI format
      let reply = data.choices?.[0]?.message?.content;
      // Anthropic format
      if (!reply && data.content) {
        reply = data.content
          .filter(b => b.type === "text")
          .map(b => b.text)
          .join("");
      }
      if (reply) {
        addMsg("assistant", reply);
        messages.push({ role: "assistant", content: reply });
      } else {
        addMsg("error", "No response content from LLM");
      }
    }
  } catch (err) {
    addMsg("error", `Network error: ${err.message}`);
    messages.pop();
  }

  sendBtn.disabled = false;
  promptEl.focus();
}
</script>
</body>
</html>

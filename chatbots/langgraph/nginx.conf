server {
    listen 80;

    # Chat UI (served by the chatbot FastAPI app)
    location = / {
        proxy_pass http://chatbot:8080/;
        proxy_set_header Host $host;
    }

    # Chatbot API (LangGraph agent)
    location /chat {
        proxy_pass http://chatbot:8080/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Chatbot reset endpoint
    location /reset {
        proxy_pass http://chatbot:8080/reset;
        proxy_set_header Host $host;
    }

    # Chatbot health
    location = /health {
        proxy_pass http://chatbot:8080/health;
    }

    # Audit viewer — rewrite /api/ paths in HTML so they work under /audit/ prefix
    location /audit/ {
        proxy_pass http://audit:8080/;
        proxy_set_header Host $host;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter "'/api/" "'/audit/api/";
    }

    # Audit viewer API (proxied so the rewritten paths resolve)
    location /audit/api/ {
        proxy_pass http://audit:8080/api/;
        proxy_set_header Host $host;
    }

    # Direct Seraph health (for debugging)
    location /seraph/health {
        proxy_pass http://seraph:8000/health;
    }
}

name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing -v
        env:
          SECRET_KEY: "ci-test-secret-key-at-least-32-characters-long"
          DEBUG: "true"

      - name: Install chatbot dependencies
        run: pip install -r chatbot/requirements.txt -r chatbot/requirements-test.txt

      - name: Run chatbot tests
        working-directory: chatbot
        run: pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing -v
        env:
          OPENAI_API_KEY: "test-fake-key"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
